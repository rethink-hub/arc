services:
  jekyll:
    build: .
    ports:
      - "4000:4000"
      - "35729:35729"  # livereload
    volumes:
      - .:/srv/jekyll
      - /srv/jekyll/vendor/bundle
    environment:
      - JEKYLL_ENV=development
    command: >
      bundle exec jekyll serve
      --host 0.0.0.0
      --port 4000
      --livereload
      --force_polling
      --baseurl /arc
