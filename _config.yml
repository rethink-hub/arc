# GitHub Pages Configuration for Arc

# Site settings
title: "Free AI Screen Assistant for Android | Arc AI"
description: "Freemium Android AI assistant — 7 free requests/week on basic features. Premium subscription unlocks summaries, TTS, AI chat, and workflow automation."
author: "Mamata"
tagline: "Understand Your Screen. Instantly."

# Theme selection
theme: jekyll-theme-cayman

# Build settings
markdown: kramdown

# Plugins — removed jekyll-sitemap, using custom sitemap.xml instead
plugins:
  - jekyll-seo-tag

# SEO settings
lang: en-US
url: "https://rethink-hub.github.io" # Your GitHub Pages URL
baseurl: "/arc" # Repository name as subdirectory

# Social and contact info (for SEO)
social:
  name: Mamata
  links:
    - https://play.google.com/store/apps/details?id=com.rethink.arc
    - https://x.com/rethink_hub

# Additional SEO metadata
keywords: "AI assistant Android, Android AI app, AI summary app, AI text reader, screen reader AI, AI workflow automation, AI productivity assistant, text to speech AI Android, AI reading assistant, Android accessibility AI, AI automation, AI fact checker, AI actions"

# App-specific metadata
app:
  name: "Arc: AI Screen Assistant"
  package: "com.rethink.arc"
  category: "Productivity"
  platform: "Android"
  price: "Freemium with subscription"
  features:
    - "AI-powered text summarization"
    - "Text-to-speech with language detection"
    - "AI chat for any screen content"
    - "Custom AI workflow automation"
    - "Community AI actions"
    - "Privacy-focused design"

# Google Analytics 4 (add your tracking ID when ready)
# google_analytics: G-XXXXXXXXXX

# Webmaster verification codes
webmaster_verifications:
  google: "uasxVvwHB2RKEkZYh15-z6cjzqrGbJPM4DCoubNk5Y8"

# Exclude files from build — prevent junk pages in sitemap
exclude:
  - README.md
  - DEPLOYMENT.md
  - LOCAL_PREVIEW.md
  - SEO-IMPLEMENTATION-COMPLETE.md
  - DEPLOY-AND-TEST.md
  - VERIFICATION-REPORT.md
  - FINAL-STATUS.md
  - QUICK-DEPLOY.sh
  - assets/images/SOCIAL-SHARE-IMAGE-GUIDE.md
  - assets/README.md
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - .DS_Store

# Include files
include:
  - _pages
  - privacy.md
  - assets

# Default layout
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "assets"
    values:
      layout: null